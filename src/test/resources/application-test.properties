# Test configuration - use SQLite file-based DB to avoid touching MySQL
spring.datasource.url=jdbc:sqlite:target/test-db.sqlite
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.username=
spring.datasource.password=

# Hibernate: create schema for tests and drop afterwards
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Use a small pool for tests
spring.datasource.hikari.maximum-pool-size=2
