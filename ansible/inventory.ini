[CHOICE_A]

# Default local connection for running playbooks on the control host
localhost ansible_connection=local ansible_user=sudoku

# SSH to the web container on the local Docker host (mapped to host port 2222)
springboot-web ansible_host=127.0.0.1 ansible_port=2222 ansible_user=root ansible_password=123 ansible_ssh_common_args='-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'

[web_servers]
springboot-web

# If you prefer to run locally inside the container, keep `localhost` and use connection=local.
