---
- name: Deploy, build, test and backup on web server
  hosts: springboot-web
  become: true

  vars:
    repo_path: /var/lib/jenkins/workspace/final_ExamDevOps

    # =========================
    # DATABASE CONFIG
    # =========================
    mysql_host: 127.0.0.1   # CHANGE THIS to DB server IP if remote DB exists
    mysql_port: 3306
    mysql_user: root
    mysql_password: "123"
    mysql_db: devops_final

    # =========================
    # BACKUP PATH
    # =========================
    backup_dir: "{{ repo_path }}/backup"
    backup_file: "{{ backup_dir }}/backup.sql"

  tasks:

    # =========================
    # PROJECT INFO
    # =========================
    - name: Show project path
      debug:
        msg: "Using project path {{ repo_path }}"

    # =========================
    # INSTALL MYSQL CLIENT
    # =========================
    - name: Install MySQL client (Ubuntu/Debian)
      apt:
        name: mysql-client
        state: present
        update_cache: yes
      when: ansible_facts['os_family'] == "Debian"

    - name: Install MySQL client (RHEL/CentOS)
      yum:
        name: mysql
        state: present
      when: ansible_facts['os_family'] == "RedHat"

    # =========================
    # PROJECT CHECKS
    # =========================
    - name: Check composer.json
      stat:
        path: "{{ repo_path }}/composer.json"
      register: composer_json

    - name: Install Composer dependencies
      command: composer install --no-interaction
      args:
        chdir: "{{ repo_path }}"
      when: composer_json.stat.exists

    - name: Check package.json
      stat:
        path: "{{ repo_path }}/package.json"
      register: package_json

    - name: Install Node dependencies
      command: npm install
      args:
        chdir: "{{ repo_path }}"
      when: package_json.stat.exists

    - name: Build frontend
      command: npm run build
      args:
        chdir: "{{ repo_path }}"
      when: package_json.stat.exists

    - name: Check pom.xml
      stat:
        path: "{{ repo_path }}/pom.xml"
      register: maven_project

    - name: Run Maven tests
      command: mvn -B test
      args:
        chdir: "{{ repo_path }}"
      when: maven_project.stat.exists

    # =========================
    # BACKUP SECTION (FIXED)
    # =========================
    - name: Create backup directory
      file:
        path: "{{ backup_dir }}"
        state: directory
        mode: '0755'

    - name: Check MySQL connection before backup
      shell: >
        mysqladmin -h {{ mysql_host }}
        -u {{ mysql_user }}
        -p'{{ mysql_password }}'
        ping
      register: mysql_check
      ignore_errors: true

    - name: Show MySQL status
      debug:
        msg: "MySQL connection status: {{ mysql_check.rc }}"

    - name: Backup MySQL database (ONLY if MySQL reachable)
      shell: >
        mysqldump -h {{ mysql_host }}
        --port={{ mysql_port }}
        -u {{ mysql_user }}
        -p'{{ mysql_password }}'
        {{ mysql_db }}
        > {{ backup_file }}
      args:
        executable: /bin/bash
      when: mysql_check.rc == 0

    - name: Skip backup if MySQL not reachable
      debug:
        msg: "WARNING: MySQL not reachable. Backup skipped."
      when: mysql_check.rc != 0

    - name: Verify backup file exists
      stat:
        path: "{{ backup_file }}"
      register: backup_result

    - name: Show final backup result
      debug:
        msg: >
          {{ "Backup SUCCESS" if backup_result.stat.exists else "Backup NOT CREATED (DB not reachable)" }}