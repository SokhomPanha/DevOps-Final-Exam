---
- name: Deploy, build, test and backup on web server
  hosts: springboot-web
  become: true

  vars:
    repo_path: /var/lib/jenkins/workspace/final_ExamDevOps

    # IMPORTANT: change this if DB is on another server
    mysql_host: 127.0.0.1
    mysql_user: root
    mysql_password: "123"
    mysql_db: devops_final

    backup_dir: "{{ repo_path }}/backup"

  tasks:

    # =========================
    # SHOW PROJECT
    # =========================
    - name: Show current project path
      debug:
        msg: "Using project path {{ repo_path }}"

    # =========================
    # INSTALL MYSQL CLIENT
    # =========================
    - name: Install MySQL client (Debian/Ubuntu)
      apt:
        name: mysql-client
        state: present
        update_cache: yes
      when: ansible_facts['os_family'] == "Debian"

    - name: Install MySQL client (RHEL/CentOS)
      yum:
        name: mysql
        state: present
      when: ansible_facts['os_family'] == "RedHat"

    # =========================
    # PROJECT CHECKS
    # =========================
    - name: Check for composer.json
      stat:
        path: "{{ repo_path }}/composer.json"
      register: composer_json

    - name: Install Composer dependencies
      command: composer install --no-interaction
      args:
        chdir: "{{ repo_path }}"
      when: composer_json.stat.exists

    - name: Check for package.json
      stat:
        path: "{{ repo_path }}/package.json"
      register: package_json

    - name: Install Node dependencies
      command: npm install
      args:
        chdir: "{{ repo_path }}"
      when: package_json.stat.exists

    - name: Build frontend assets
      command: npm run build
      args:
        chdir: "{{ repo_path }}"
      when: package_json.stat.exists

    - name: Check for pom.xml
      stat:
        path: "{{ repo_path }}/pom.xml"
      register: maven_project

    - name: Run Maven tests
      command: mvn -B test
      args:
        chdir: "{{ repo_path }}"
      when: maven_project.stat.exists

    # =========================
    # BACKUP SECTION
    # =========================
    - name: Create backup directory
      file:
        path: "{{ backup_dir }}"
        state: directory
        mode: '0755'

    - name: Backup MySQL database
      shell: >
        mysqldump -h {{ mysql_host }}
        -u {{ mysql_user }}
        -p'{{ mysql_password }}'
        {{ mysql_db }}
        > {{ backup_dir }}/backup.sql
      args:
        executable: /bin/bash
      ignore_errors: no

    - name: Verify backup file exists
      stat:
        path: "{{ backup_dir }}/backup.sql"
      register: backup_file

    - name: Show backup result
      debug:
        msg: "Backup created successfully"
      when: backup_file.stat.exists